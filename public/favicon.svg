<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>
  <!-- Rounded Square Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg-grad)" />
  
  <!-- Subtle Inner Border -->
  <rect x="5" y="5" width="90" height="90" rx="17" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.15" />
  
  <!-- White 'VS' text in bold modern sans-serif -->
  <text x="50" y="52" 
        font-family="system-ui, -apple-system, 'SF Pro Display', Roboto, Helvetica, sans-serif" 
        font-size="44" 
        font-weight="800" 
        fill="#ffffff" 
        text-anchor="middle" 
        dominant-baseline="middle"
        letter-spacing="-1.5">VS</text>
</svg>
